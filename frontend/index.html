<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, height=device-height, viewport-fit=cover" />
		<script>
			(() => {
				try {
					const saved = localStorage.getItem("gestor_barbearia_theme");
					const theme =
						saved ||
						(matchMedia("(prefers-color-scheme: light)").matches ? "light" : (
							"dark"
						));
					document.documentElement.dataset.theme = theme;
					document.documentElement.style.colorScheme = theme;
				} catch {
					document.documentElement.dataset.theme = "dark";
				}
			})();
		</script>
		<title>Gestor Barbearia | Sistema de agenda e caixa para barbearias</title>
		<meta
			name="description"
			content="Sistema simples para barbearias controlarem agenda, caixa, equipe, produtos, despesas e fiados em um painel operacional." />

		<meta
			property="og:description"
			content="Controle agendamentos, caixa, equipe, produtos, despesas e fiados em um painel feito para a rotina da barbearia." />
