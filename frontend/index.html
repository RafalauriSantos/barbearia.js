<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, height=device-height, viewport-fit=cover" />
		<script>
			(() => {
				try {
					const saved = localStorage.getItem("gestor_barbearia_theme");
					const theme =
						saved ||
						(matchMedia("(prefers-color-scheme: light)").matches ? "light" : (
							"dark"
						));
					document.documentElement.dataset.theme = theme;
					document.documentElement.style.colorScheme = theme;
				} catch {
					document.documentElement.dataset.theme = "dark";
				}
			})();
		</script>
		<title>Gestor Barbearia | Sistema de agenda e caixa para barbearias</title>
		<meta
			name="description"
			content="Sistema simples para barbearias controlarem agenda, caixa, equipe, produtos, despesas e fiados em um painel operacional." />
		<meta name="robots" content="index, follow" />
		<link rel="canonical" href="https://kurt-barbearia.vercel.app/" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="shortcut icon" href="/favicon.svg" />
		<link
			rel="preload"
			as="image"
			href="/images/landing-hero-barbershop.webp"
			type="image/webp"
			fetchpriority="high" />
		<meta name="theme-color" content="#060d0b" />
		<style>
			.static-landing {
				height: 100vh;
				height: 100svh;
				overflow: auto;
				background: #060d0b;
				color: #fff;
				font-family:
					Aptos, "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont,
					sans-serif;
			}
			.static-landing * {
				box-sizing: border-box;
			}
			.static-hero {
				position: relative;
				min-height: 88svh;
				overflow: hidden;
			}
			.static-hero picture,
			.static-hero img,
			.static-hero::before,
			.static-hero::after {
				position: absolute;
				inset: 0;
			}
			.static-hero img {
				width: 100%;
				height: 100%;
				object-fit: cover;
				object-position: 61% center;
			}
			.static-hero::before {
				content: "";
				z-index: 1;
				background: linear-gradient(
					90deg,
					rgba(3, 8, 7, 0.98) 0%,
					rgba(3, 8, 7, 0.88) 38%,
					rgba(3, 8, 7, 0.48) 68%,
					rgba(3, 8, 7, 0.18) 100%
				);
			}
			.static-hero::after {
				content: "";
				z-index: 2;
				background:
					radial-gradient(
						circle at 75% 36%,
						rgba(246, 190, 116, 0.16),
						transparent 32%
					),
					linear-gradient(180deg, rgba(6, 13, 11, 0) 68%, #060d0b 100%);
			}
			.static-nav,
			.static-content {
				position: relative;
				z-index: 3;
				width: min(100%, 72rem);
				margin: 0 auto;
				padding-left: 1.25rem;
				padding-right: 1.25rem;
			}
			.static-nav {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding-top: calc(1.25rem + env(safe-area-inset-top));
			}
			.static-brand {
				display: flex;
				min-width: 0;
				align-items: center;
				gap: 0.75rem;
				color: inherit;
				text-decoration: none;
			}
			.static-mark {
				position: relative;
				width: 2.5rem;
				height: 2.5rem;
				flex: 0 0 auto;
				border: 1px solid rgba(110, 231, 183, 0.35);
				border-radius: 0.375rem;
				background: rgba(110, 231, 183, 0.1);
			}
			.static-mark::before,
			.static-mark::after {
				content: "";
				position: absolute;
				left: 50%;
				top: 50%;
				height: 3px;
				border-radius: 999px;
				transform: translate(-50%, -50%) rotate(-34deg);
			}
			.static-mark::before {
				width: 1.25rem;
				background: #6ee7b7;
			}
			.static-mark::after {
				width: 1rem;
				margin-top: 0.25rem;
				background: #f0c987;
				transform: translate(-50%, -50%);
			}
			.static-brand strong,
			.static-title {
				display: block;
				font-family:
					"Aptos Display", Aptos, "Segoe UI", system-ui, -apple-system,
					sans-serif;
				font-weight: 800;
				letter-spacing: 0;
			}
			.static-brand strong {
				font-size: 1.125rem;
				line-height: 1;
			}
			.static-brand span span {
				display: block;
				margin-top: 0.15rem;
				font-size: 0.625rem;
				font-weight: 800;
				color: rgba(152, 245, 207, 0.75);
				text-transform: uppercase;
			}
			.static-nav-login {
				display: none;
				border: 1px solid rgba(255, 255, 255, 0.16);
				border-radius: 0.375rem;
				background: rgba(255, 255, 255, 0.08);
				color: rgba(255, 255, 255, 0.86);
				padding: 0.5rem 1rem;
				font-size: 0.75rem;
				font-weight: 800;
				text-decoration: none;
			}
			.static-content {
				display: flex;
				min-height: calc(88svh - 5.25rem);
				align-items: center;
				padding-top: 4.5rem;
				padding-bottom: 4rem;
			}
			.static-copy {
				max-width: 43rem;
			}
			.static-kicker,
			.static-metric-label {
				font-size: 0.6875rem;
				font-weight: 800;
				color: #98f5cf;
				text-transform: uppercase;
			}
			.static-title {
				margin: 1rem 0 0;
				max-width: 47.5rem;
				font-size: clamp(3rem, 9vw, 6.4rem);
				line-height: 0.86;
			}
			.static-copy p {
				margin: 1.25rem 0 0;
				max-width: 34rem;
				color: rgba(255, 255, 255, 0.78);
				font-size: 1rem;
				line-height: 1.65;
			}
			.static-actions {
				display: flex;
				flex-direction: column;
				gap: 0.75rem;
				margin-top: 2rem;
			}
			.static-button {
				display: inline-flex;
				min-height: 3rem;
				align-items: center;
				justify-content: center;
				border-radius: 0.375rem;
				padding: 0.75rem 1.5rem;
				font-size: 0.875rem;
				font-weight: 800;
				text-decoration: none;
			}
			.static-button-primary {
				background: #6ee7b7;
				color: #04100d;
			}
			.static-button-secondary {
				border: 1px solid rgba(255, 255, 255, 0.18);
				background: rgba(255, 255, 255, 0.08);
				color: rgba(255, 255, 255, 0.9);
			}
			.static-metrics {
				display: grid;
				grid-template-columns: repeat(3, minmax(0, 1fr));
				gap: 0.5rem;
				max-width: 36rem;
				margin-top: 2.25rem;
				padding: 1rem 0;
				border-top: 1px solid rgba(255, 255, 255, 0.12);
				border-bottom: 1px solid rgba(255, 255, 255, 0.12);
			}
			.static-metric-value {
				display: block;
				font-size: 1.5rem;
				font-weight: 900;
			}
			.static-metric-label {
				display: block;
				margin-top: 0.25rem;
				color: rgba(255, 255, 255, 0.54);
				font-size: 0.5625rem;
				line-height: 1.2;
			}
			@media (min-width: 640px) {
				.static-nav-login {
					display: inline-flex;
				}
				.static-actions {
					flex-direction: row;
				}
				.static-copy p {
					font-size: 1.125rem;
				}
			}
		</style>

		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Gestor Barbearia" />
		<meta property="og:url" content="https://kurt-barbearia.vercel.app/" />
		<meta property="og:title" content="Gestor Barbearia | Sistema de agenda e caixa para barbearias" />
		<meta name="twitter:title" content="Gestor Barbearia | Sistema de agenda e caixa para barbearias" />
		<meta
			property="og:description"
			content="Controle agendamentos, caixa, equipe, produtos, despesas e fiados em um painel feito para a rotina da barbearia." />
		<meta
			name="twitter:description"
			content="Controle agendamentos, caixa, equipe, produtos, despesas e fiados em um painel feito para a rotina da barbearia." />
		<meta
			property="og:image"
			content="https://kurt-barbearia.vercel.app/images/landing-hero-barbershop.webp" />
		<meta property="og:image:alt" content="Gestor Barbearia em uso no balcão da barbearia" />
		<meta
			name="twitter:image"
			content="https://kurt-barbearia.vercel.app/images/landing-hero-barbershop.webp" />
		<meta name="twitter:card" content="summary_large_image" />
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "SoftwareApplication",
				"name": "Gestor Barbearia",
				"applicationCategory": "BusinessApplication",
				"operatingSystem": "Web",
				"url": "https://kurt-barbearia.vercel.app/",
				"description": "Sistema web para barbearias controlarem agenda, caixa, equipe, produtos, despesas e fiados.",
				"offers": {
					"@type": "Offer",
					"price": "0",
					"priceCurrency": "BRL"
				},
				"creator": {
					"@type": "Person",
					"name": "Rafael Lauri"
				}
			}
		</script>
	</head>
	<body>
		<div id="root"></div>
		<template id="static-landing-template">
			<main class="static-landing" aria-label="Gestor Barbearia">
				<section class="static-hero">
					<picture>
						<source srcset="/images/landing-hero-barbershop.webp" type="image/webp" />
						<img
							src="/images/landing-hero-barbershop.png"
							width="1400"
							height="788"
							alt="Balcão de barbearia com tablet exibindo agenda e indicadores financeiros"
							fetchpriority="high" />
					</picture>
					<nav class="static-nav" aria-label="Navegação principal">
						<a class="static-brand" href="/">
							<span class="static-mark" aria-hidden="true"></span>
							<span>
								<strong>Gestor Barbearia</strong>
								<span>Operação em tempo real</span>
							</span>
						</a>
						<a class="static-nav-login" href="/login">Entrar</a>
					</nav>
					<div class="static-content">
						<div class="static-copy">
							<div class="static-kicker">Agenda, caixa e equipe no mesmo ritmo</div>
							<h1 class="static-title">Gestor Barbearia</h1>
							<p>
								Um painel operacional para abrir o dia, atender, receber e fechar
								o caixa sem depender de caderno, WhatsApp e planilha.
							</p>
							<div class="static-actions">
								<a class="static-button static-button-primary" href="/login?mode=signup">
									Criar acesso
								</a>
								<a class="static-button static-button-secondary" href="/login">
									Entrar na conta
								</a>
							</div>
							<div class="static-metrics" aria-label="Resumo do sistema">
								<div>
									<span class="static-metric-value">1</span>
									<span class="static-metric-label">Agenda diária</span>
								</div>
								<div>
									<span class="static-metric-value">3</span>
									<span class="static-metric-label">Status de caixa</span>
								</div>
								<div>
									<span class="static-metric-value">24h</span>
									<span class="static-metric-label">Controle online</span>
								</div>
							</div>
						</div>
					</div>
				</section>
			</main>
		</template>
		<script>
			(() => {
				const path = window.location.pathname.replace(/\/+$/, "") || "/";
				if (path !== "/" && path !== "/welcome") return;
				const root = document.getElementById("root");
				const template = document.getElementById("static-landing-template");
				root?.appendChild(template.content.cloneNode(true));
			})();
		</script>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
