<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, height=device-height, viewport-fit=cover" />
		<script>
			(() => {
				try {
					const saved = localStorage.getItem("gestor_barbearia_theme");
					const theme =
						saved ||
						(matchMedia("(prefers-color-scheme: light)").matches ? "light" : (
							"dark"
						));
					document.documentElement.dataset.theme = theme;
					document.documentElement.style.colorScheme = theme;
				} catch {
					document.documentElement.dataset.theme = "dark";
				}
			})();
		</script>
		<title>Gestor Barbearia - Gestao para Barbearias</title>
		<meta
			name="description"
			content="Gestor Barbearia: sistema simples para barbearias. Controle agendamentos, comissoes e fiados." />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="shortcut icon" href="/favicon.svg" />

		<meta property="og:type" content="website" />
		<meta property="og:title" content="Gestor Barbearia - Gestao para Barbearias" />
		<meta name="twitter:title" content="Gestor Barbearia - Gestao para Barbearias" />
		<meta
			property="og:description"
			content="Gestor Barbearia: sistema simples para barbearias. Controle agendamentos, comissoes e fiados." />
		<meta
			name="twitter:description"
			content="Gestor Barbearia: sistema simples para barbearias. Controle agendamentos, comissoes e fiados." />
		<meta name="twitter:card" content="summary_large_image" />
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
