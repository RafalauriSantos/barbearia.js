name: Keep Render backend awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keep-render-backend-awake
  cancel-in-progress: false

jobs:
  ping:
    name: Ping backend health
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Call Render health endpoint
        run: |
          curl --fail --show-error --silent --max-time 90 --retry 3 --retry-delay 10 --retry-all-errors \
            "https://kurt-api.onrender.com/health/db"
